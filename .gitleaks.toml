# Gitleaks config for linuxgsm-panel.
# Uses the full default ruleset, plus an allowlist for the UI's token *placeholders*
# (example strings shown to the user in input hints) so they don't trip a false
# positive. Real secrets (SSH creds, secret_key, config.json, panel.db) live in the
# gitignored data/ directory and are never committed.

title = "linuxgsm-panel gitleaks"

[extend]
useDefault = true

[allowlist]
description = "Non-secret UI placeholders and example values"
# Match against the detected secret text.
regexTarget = "match"
regexes = [
  '''tskey-auth-\.{2,}''',          # Tailscale auth-key input placeholder (e.g. "tskey-auth-...")
  '''tskey-auth-\.\.\.''',
  '''C1a[.…]''',                    # Ubuntu Pro token input placeholder (e.g. "C1a…")
  '''~/\.ssh/id_rsa''',             # default SSH key *path* shown in the add-remote form
  '''tskey-[A-Za-z0-9]{0,6}\.\.\.''',
  '''maxBytes=\d+''',               # false positive: the auth.log RotatingFileHandler size — the
                                    # generic-api-key rule keys off "AUTH" in AUTH_LOG_PATH; not a secret
]
# Belt-and-suspenders: these files only contain example/placeholder strings, never
# real credentials.
paths = [
  '''README\.md''',
]
