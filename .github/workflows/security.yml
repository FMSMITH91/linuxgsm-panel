name: Security scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 6 * * 1"   # weekly, Monday 06:00 UTC — catches newly-disclosed CVEs

# Cancel an in-progress run when a newer commit is pushed to the same ref, so rapid
# pushes don't queue up and waste runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency vulnerabilities (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - run: python -m pip install --quiet pip-audit
      # FAILS the run if any declared dependency has a known vulnerability — this
      # is actionable (bump the version), so it's a hard gate.
      - run: pip-audit -r requirements.txt

  sast-bandit:
    name: Python security lint (Bandit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF to the Security tab (code scanning)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - run: python -m pip install --quiet bandit bandit-sarif-formatter
      # Emit SARIF and publish it to GitHub code scanning (the Security tab), alongside
      # CodeQL. The skips drop checks that don't apply to this app by design: assert,
      # bind-all, the subprocess/shell + paramiko command family (commands are _quote()'d
      # and shell identifiers are @validates-guarded), the auto-add host-key policy, and
      # the intentional best-effort try/except pattern. B105 (hardcoded secrets), eval,
      # unsafe deserialization, weak crypto, etc. stay ON — so real signal surfaces.
      # tests/ is excluded (its fixture passwords are not secrets; Gitleaks scans the
      # whole repo for real ones). Non-blocking: findings are tracked as alerts, not gates.
      - name: Bandit (SARIF)
        run: |
          bandit -r . -x ./venv,./.github,./tests \
            --skip B101,B104,B404,B601,B602,B603,B604,B607,B507,B110,B112 \
            -f sarif -o bandit.sarif || true
      - name: Upload Bandit results to code scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: bandit.sarif
          category: bandit

  sast-semgrep:
    name: Deep SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - run: python -m pip install --quiet semgrep
      # Registry rulesets, fetched anonymously (no Semgrep account/token needed):
      # general security-audit + Python + Flask + command-injection + secrets. This
      # catches real code vulns (injection, SSRF, path traversal, unsafe redirects,
      # weak crypto, template XSS, etc.). Informational — the findings go to the job
      # summary so a false positive never blocks an alpha build, but they're surfaced
      # on every push/PR and weekly.
      - name: Semgrep scan
        run: |
          semgrep scan \
            --config p/security-audit --config p/python --config p/flask \
            --config p/command-injection --config p/secrets \
            --exclude venv --exclude .github --exclude data \
            --metrics=off > semgrep.txt 2>&1 || true
          {
            echo '### 🛡️ Semgrep SAST';
            echo '';
            echo '```';
            tail -c 12000 semgrep.txt 2>/dev/null || echo '(no findings)';
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

  secret-scan:
    name: Secret scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0   # scan the FULL git history, not just the tip
      # Blocking gate: a committed credential is always actionable. --redact keeps the
      # secret out of the public log. Uses the OSS binary directly (free on any repo;
      # the marketplace action needs a licence for orgs). The .gitleaks.toml allowlist
      # excludes the UI's token *placeholders* so they don't trip a false positive.
      - name: Gitleaks
        env:
          # Authenticate the release lookup — an anonymous api.github.com call is capped
          # at 60/hour per runner IP and intermittently 403s (rate limit). The built-in
          # token lifts that to 5000/hour, so the download stops flaking.
          GH_TOKEN: ${{ github.token }}
        run: |
          URL=$(curl -sSfL -H "Authorization: Bearer $GH_TOKEN" \
                     https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
                | grep -o 'https://[^"]*linux_x64\.tar\.gz' | head -1)
          curl -sSfL "$URL" | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --config .gitleaks.toml \
            --redact --verbose --exit-code 1
