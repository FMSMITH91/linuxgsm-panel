name: Security scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 6 * * 1"   # weekly, Monday 06:00 UTC — catches newly-disclosed CVEs

jobs:
  dependency-audit:
    name: Dependency vulnerabilities (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install --quiet pip-audit
      # FAILS the run if any declared dependency has a known vulnerability — this
      # is actionable (bump the version), so it's a hard gate.
      - run: pip-audit -r requirements.txt

  code-scan:
    name: Python security lint (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install --quiet bandit
      # Informational only. This app intentionally shells out to LinuxGSM and uses
      # paramiko's auto-add-host-key policy, so those checks are skipped; the report
      # (hardcoded secrets, eval, unsafe deserialization, etc.) is written to the
      # job summary. Never blocks the build.
      - name: Bandit report
        run: |
          bandit -r . -x ./venv,./.github \
            --skip B101,B104,B404,B602,B603,B604,B607,B507 \
            -f txt -o bandit.txt || true
          {
            echo '### 🔒 Bandit security report';
            echo '';
            echo '```';
            tail -c 8000 bandit.txt 2>/dev/null || echo '(no findings)';
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"
