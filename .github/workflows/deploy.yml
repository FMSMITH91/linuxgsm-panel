name: Deploy

# Auto-deploy to the panel host after CI passes on main. DORMANT by default: the job
# only runs when the repo variable DEPLOY_ENABLED == 'true', so committing this file
# changes nothing until you opt in. It deploys by running install.sh's UPDATE path
# (snapshot -> git pull -> restart -> health-check -> AUTO-ROLLBACK on failure), so a
# bad release can't leave the panel down.
#
# ── One-time setup to enable ──────────────────────────────────────────────────
#  1. Tailscale OAuth client (admin console -> Settings -> OAuth clients), scope
#     "auth_keys", tag: tag:ci. Save as repo SECRETS:
#        TS_OAUTH_CLIENT_ID, TS_OAUTH_SECRET
#  2. Tailnet ACL: allow tag:ci to SSH the host as the deploy user, e.g.
#        "ssh": [{ "action": "accept", "src": ["tag:ci"],
#                  "dst": ["tag:server"], "users": ["ubuntu"] }]
#     (the host must have `tailscale up --ssh`).
#  3. Repo VARIABLES (Settings -> Secrets and variables -> Actions -> Variables):
#        DEPLOY_ENABLED = true
#        DEPLOY_HOST    = <the host's MagicDNS name or tailnet IP>
#        DEPLOY_USER    = ubuntu           # optional, defaults to ubuntu
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: [ "CI" ]
    types: [ completed ]

# Least-privilege GITHUB_TOKEN: deploy reads the repo and SSHes to the host; no write needed.
permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    # Only after CI SUCCEEDED on main, and only when explicitly enabled.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Join the tailnet
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy via safe self-update (snapshot + health-check + rollback)
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?Set repo variable DEPLOY_HOST to the tailnet host}"
          U="${DEPLOY_USER:-ubuntu}"
          # Tailscale SSH handles auth (no key needed); install.sh does the safe update.
          # PANEL_NO_UPGRADE=1: the auto-deploy is a panel-only update — it must never
          # apt-upgrade or reboot the deploy host (that would drop this SSH session and fail
          # the job). OS updates on that host stay a manual/interactive decision.
          # Refresh install.sh ITSELF to the latest before running it. The deploy executes the
          # on-disk updater, so a bug in a shipped install.sh would otherwise trap the host on that
          # broken version forever (it crashes before it can pull the fix). Updating just install.sh
          # first — the rest of the tree is still updated by install.sh under its own
          # snapshot/health-check/rollback — also means the deploy validates the CURRENT commit's
          # updater, not the previous one.
          ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 \
            "$U@$DEPLOY_HOST" 'cd ~/linuxgsm-panel && git fetch --quiet origin main && git checkout origin/main -- install.sh && PANEL_NO_UPGRADE=1 bash install.sh'
