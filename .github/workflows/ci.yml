name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Byte-compile all Python (fails on syntax errors)
        run: python -m compileall -q .

      - name: Lint for real bugs only (undefined names, bad syntax) — no style noise
        run: |
          python -m pip install --quiet flake8
          # E9 = syntax errors, F63/F7/F82 = actual logic errors (e.g. undefined names).
          # Style is intentionally NOT checked.
          flake8 --select=E9,F63,F7,F82 --show-source --statistics .

      - name: Smoke test — boot the app and assert the main routes don't 500
        run: |
          python -m pip install --quiet -r requirements.txt
          # Boots the app on a throwaway DB and exercises the main pages plus the
          # group create/edit routes, catching runtime 500s that compile/lint miss.
          python tests/smoke_test.py
