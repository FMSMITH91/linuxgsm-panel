name: CI

on:
  # Skip a run when a push/PR touches ONLY docs/meta the tests don't exercise — a README or
  # LICENSE edit shouldn't spin up the whole matrix. Any code, template, test, requirements,
  # install.sh, or workflow change still triggers CI (those all affect what the tests check).
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
  workflow_dispatch:  # allow manual runs from the Actions tab

# Least-privilege GITHUB_TOKEN: these jobs only read the repo.
permissions:
  contents: read

# Newer push to the same ref cancels an in-progress run (faster feedback, fewer minutes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: checks (${{ matrix.os }} · py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # report BOTH LTS results even if one fails, so a version-specific break is obvious
      matrix:
        include:
          # The Ubuntu LTS releases LinuxGSM supports, each paired with the Python it ships, so the
          # suite is proven on the versions the panel will actually run on — not just ubuntu-latest.
          # (20.04 is EOL and its Python 3.8 is below the dependency floor, so it isn't targeted.)
          - os: ubuntu-22.04
            python: "3.10"
          - os: ubuntu-24.04
            python: "3.12"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: python -m pip install --quiet -r requirements.txt flake8

      - name: Run all checks (compile, lint, unit, smoke, shellcheck)
        # Same script developers run locally via ./tools/run-tests.sh, so green here == green there.
        # shellcheck is pre-installed on the ubuntu runners.
        run: PYTHON=python bash tools/run-tests.sh
