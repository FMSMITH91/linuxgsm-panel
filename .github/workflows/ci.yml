name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # allow manual runs from the Actions tab

# Least-privilege GITHUB_TOKEN: these jobs only read the repo.
permissions:
  contents: read

# Newer push to the same ref cancels an in-progress run (faster feedback, fewer minutes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --quiet -r requirements.txt flake8

      - name: Run all checks (compile, lint, unit, smoke, shellcheck)
        # Same script developers run locally via ./run-tests.sh, so green here == green there.
        # shellcheck is pre-installed on ubuntu-latest runners.
        run: PYTHON=python bash run-tests.sh
