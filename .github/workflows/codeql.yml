name: CodeQL

# GitHub's semantic code analysis — deeper than the pattern-based bandit/semgrep
# in security.yml. Finds data-flow bugs (injection, path traversal, etc.) and
# reports them in the repo's Security tab.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # allow manual runs from the Actions tab

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for the whole workflow; the analyze job escalates only the
# scopes CodeQL actually needs (security-events: write). Satisfies Scorecard's
# Token-Permissions "define a top-level permissions block" check.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    # Code scanning uploads only work on public repos (or private w/ GitHub Advanced
    # Security). While the repo is private this job is SKIPPED (grey), not failed; it
    # activates automatically once the repo is made public.
    if: ${{ github.event.repository.private == false }}
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          category: "/language:python"
