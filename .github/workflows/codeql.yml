name: CodeQL

# GitHub's semantic code analysis — deeper than the pattern-based bandit/semgrep
# in security.yml. Finds data-flow bugs (injection, path traversal, etc.) and
# reports them in the repo's Security tab.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    # Code scanning uploads only work on public repos (or private w/ GitHub Advanced
    # Security). While the repo is private this job is SKIPPED (grey), not failed; it
    # activates automatically once the repo is made public.
    if: ${{ github.event.repository.private == false }}
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
