name: CodeQL

# GitHub's semantic code analysis — deeper than the pattern-based bandit/semgrep
# in security.yml. Finds data-flow bugs (injection, path traversal, etc.) and
# reports them in the repo's Security tab.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly, so newly-published queries catch issues even without a push.
    - cron: "0 6 * * 1"

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
