name: Release

# When VERSION changes on main to a STABLE (non-prerelease) version, tag the commit
# v<VERSION> and cut a GitHub Release with the commits since the last tag as notes.
# Pre-releases (-alpha/-beta/-rc/-dev) are SKIPPED — auto-deploy still ships every
# push, so day-to-day alpha bumps don't clutter the tag/release list. Fully automatic.

on:
  push:
    branches: [ main ]
    paths: [ "VERSION" ]

# Least-privilege default; only the release job escalates to contents: write (it
# pushes the tag and creates the GitHub Release). Keeps Scorecard's Token-Permissions
# check happy by not granting write at the top level.
permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push the v<VERSION> tag + create the Release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0   # need full history for the changelog + existing tags

      - name: Tag and release (stable versions only)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          V="v$(tr -d '[:space:]' < VERSION)"
          # Only tag stable releases — skip any pre-release suffix.
          case "$V" in
            *-alpha*|*-beta*|*-rc*|*-dev*)
              echo "$V is a pre-release — skipping (only stable versions are tagged)."
              exit 0 ;;
          esac
          if git rev-parse -q --verify "refs/tags/$V" >/dev/null; then
            echo "$V already tagged — nothing to release."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$V"
          git push origin "$V"
          # Changelog: commits since the previous tag (or all history for the first).
          PREV="$(git describe --tags --abbrev=0 "$V^" 2>/dev/null || true)"
          if [ -n "$PREV" ]; then RANGE="$PREV..$V"; else RANGE="$V"; fi
          NOTES="$(git log --no-merges --pretty='- %s' "$RANGE" | head -40)"
          gh release create "$V" --title "$V" --notes "${NOTES:-Release $V}"
