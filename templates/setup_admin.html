{% extends "base.html" %}
{% block title %}Setup - Admin Account{% endblock %}
{% block content %}
<div class="setup-card">
  <div class="card">
    <div class="card-body p-4">
      <div class="d-flex align-items-center mb-4">
        <span class="badge bg-secondary me-2">Step 2/4</span>
        <h4 class="mb-0">Create Admin Account</h4>
      </div>
      <p class="text-secondary small">This will be the super admin account — full access to everything.</p>
      <form method="POST">
        <input type="hidden" name="step" value="admin_user">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" required minlength="3" autocomplete="off">
        </div>
        <div class="mb-3">
          <label class="form-label">Email (optional)</label>
          <input type="email" name="email" class="form-control" autocomplete="off">
        </div>
        <div class="row">
          <div class="col">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required minlength="10" autocomplete="new-password">
          </div>
          <div class="col">
            <label class="form-label">Confirm Password</label>
            <input type="password" name="confirm_password" class="form-control" required autocomplete="new-password">
          </div>
        </div>
        <button type="submit" class="btn btn-primary mt-3 w-100">
          <i class="bi bi-arrow-right"></i> Create & Continue
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
